{% extends "layout.html" %}

{% block title %}Etsi resepti{% endblock %}

{% block content %}
  <h2>Etsi respa</h2>
  
  <form action="/find_recipe" method="get">
    <p>
      Hakusana: <input type="text" name="query" value = "{{ query }}">
    </p>
    <input type="submit" value="Hae">
  </form>
    <br>
  {% for recipe in results %}
    <li>
      <a href="/recipe/{{ recipe.id }}">{{ recipe.name }}</a>
    </li>
  {% endfor %}
{% endblock %}
