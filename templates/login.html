{% extends "layout.html" %}

{% block title %}Kirjaudu sisään{% endblock %}

{% block content %}
<div class="content">
  <h2>Kirjaudu sisään</h2>
  <form action="/login" method="post">
    <p>
      Käyttäjänimi: <br />
      <label for="username" class="hidden">Käyttäjänimi</label>
      <input type="text" name="username" id="username"/>
    </p>
    <p>
      Salasana: <br />
      <label for="password" class="hidden">Salasana</label>
      <input type="password" name="password" id="password"/>
    </p>
    <input type="submit" class="button" value="Kirjaudu" />
  </form>
  {% set messages = get_flashed_messages() %}
  <p class="error">
    {% if messages %}
    {{ messages[0] }}
    {% endif %}
  </p>
</div>
{% endblock %}
