<!DOCTYPE html>
{% if session.user_id == recipe.user_id %}
<head>
  <title>Reseptin muokkaus</title>
</head>
<body>

<h1>Muokkaa reseptiä</h1>

<form method="post" action="/edit_recipe/{{ recipe.id }}">

  <p>Reseptin nimi:</p>
    <input type="text" name="recipename" value="{{ recipe.name }}" maxlength="50" required>

  <p>Ainesosat:</p>
  <p>
  <input type="hidden" name="count" value="{{ count }}">
  </p>

  {% for i in range(count) %}
    <div>
      <input type="text" name="ingredients{{ i }}" value="{{ ingredients[i] }}" maxlength="70">
      <button type="submit" name="remove" value="{{ i }}">Poista</button>
    </div>
  {% endfor %}

  <button type="submit" name="add" value="1">Lisää ainesosa</button>

  <p>Ohjeet:</p>
    <textarea name="description" rows="15" cols="80" maxlength="1000">{{ recipe.description }}</textarea>
  
    <p>
    Luokittelu:
    <select name="section">
      <option value="">(valitse)</option>
      <option value="Alkuruuat" {% if section == "Alkuruuat" %}selected{% endif %}>Alkuruuat</option>
      <option value="Pääruuat" {% if section == "Pääruuat" %}selected{% endif %}>Pääruuat</option>
      <option value="Jälkiruuat" {% if section == "Jälkiruuat" %}selected{% endif %}>Jälkiruuat</option>
      <option value="Komponentit" {% if section == "Komponentit" %}selected{% endif %}>Komponentit</option>
    </select>
  
  <p>
    Aika:
    <input type="number"
           name ="hours"
           value="{{ hours }}"
           placeholder="Tunnit"
           max="48">
    <input type="number"
           name="minutes"
           value="{{ minutes }}"
           placeholder="Minuutit"
           max="59">
  
  </p>

  <input type="submit" name="save" value="Tallenna">

</form>
  
  {%else%}
  <p>Et ole reseptin tekijä!</p>
    <p>
    <a href="/login">Kirjaudu </a>
    </p>
    <p>
    <a href="/">Etusivulle</a>
    </p>
  {%endif%}

</body>
</html>
