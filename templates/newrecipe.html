<!DOCTYPE html>
{% if session.user_id %}
<head>
  <title>Lisää resepti</title>
</head>
<body>

<h1>Uusi resepti</h1>

<form action="/submit" method="post">

  <p>Reseptin nimi:</p>
    <input type="text" name="recipename" value="{{ recipename }}" maxlength="50" required><br><br>

  <p>Ainesosat:</p>
  {% for i in range(count) %}
    <input type="text"
           name="ingredients{{ i }}"
           value="{{ ingredients[i] }}"
           maxlegth="50"
           placeholder="Ainesosa">

    <input type="text"
           name="amounts{{ i }}"
           value="{{ amounts[i] }}"
           maxlength="20"
           placeholder="Määrä">
    <br>
  {% endfor %}

  <input type="hidden" name="count" value="{{ count }}">

  <button type="submit" formaction="/newrecipe" name="add">Lisää ainesosa
  </button>

  <p>Ohjeet:</p>
  <textarea name="description" rows="15" cols="80" maxlength="1000">{{ description }}</textarea>
  
  <p>
    Luokittelu:
    <select name="section">
      <option value="">(valitse)</option>
      <option value="Alkuruuat" {% if section == "Alkuruuat" %}selected{% endif %}>Alkuruuat</option>
      <option value="Pääruuat" {% if section == "Pääruuat" %}selected{% endif %}>Pääruuat</option>
      <option value="Jälkiruuat" {% if section == "Jälkiruuat" %}selected{% endif %}>Jälkiruuat</option>
      <option value="Komponentit" {% if section == "Komponentit" %}selected{% endif %}>Komponentit</option>
    </select>
  
  <p>
    Aika:
    <input type="number"
           name ="hours"
           value="{{ hours }}"
           placeholder="Tunnit"
           max="48">
    <input type="number"
           name="minutes"
           value="{{ minutes }}"
           placeholder="Minuutit"
           max="59">
  
  </p>

  <br><br>
  <input type="submit" value="Julkaise">

</form>
  
  {%else%}
  <p>Kirjaudu ensin sisään lisätäksesi reseptin</p>
    <a href="/login">Kirjaudu </a>
  {%endif%}

</body>
</html>
